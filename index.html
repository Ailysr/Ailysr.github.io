<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ailysr 的个人博客</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:700,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --main-color: #2d9cdb;
      --bg-color: #f9f9f9;
      --card-bg: #fff;
      --text-color: #222;
      --shadow: 0 6px 24px rgba(0,0,0,0.08);
    }
    body {
      margin: 0;
      font-family: 'Montserrat', 'Helvetica Neue', Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      background: var(--card-bg);
      border-radius: 15px;
      box-shadow: var(--shadow);
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--main-color);
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(45,156,219,0.15);
    }
    .center {
      text-align: center;
    }
    h1 {
      margin: 10px 0 5px 0;
      font-size: 2.2em;
      letter-spacing: 2px;
      font-weight: 700;
      color: var(--main-color);
    }
    h2 {
      color: var(--main-color);
      margin-top: 40px;
      font-size: 1.4em;
      border-left: 4px solid var(--main-color);
      padding-left: 8px;
      font-weight: 700;
    }
    .desc {
      color: #444;
      font-size: 1.1em;
      margin-bottom: 20px;
    }
    .tags {
      margin: 10px 0 20px 0;
    }
    .tag {
      display: inline-block;
      background: var(--main-color);
      color: #fff;
      padding: 4px 12px;
      border-radius: 12px;
      margin: 2px 8px 2px 0;
      font-size: 0.95em;
      letter-spacing: 1px;
    }
    .social {
      margin: 16px 0;
    }
    .social a {
      display: inline-block;
      margin: 0 10px;
      color: var(--main-color);
      font-size: 1.5em;
      text-decoration: none;
      transition: color .2s;
    }
    .social a:hover {
      color: #176c9c;
    }
    .post-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .post-list li {
      margin: 20px 0;
      background: #f2f8fc;
      border-left: 4px solid var(--main-color);
      padding: 14px 20px;
      border-radius: 6px;
      box-shadow: 0 1px 6px rgba(45,156,219,0.05);
      transition: box-shadow .15s;
    }
    .post-list li:hover {
      box-shadow: 0 4px 16px rgba(45,156,219,0.14);
    }
    .post-title {
      font-size: 1.1em;
      font-weight: bold;
      color: var(--main-color);
      text-decoration: none;
    }
    .post-date {
      color: #aaa;
      font-size: 0.95em;
      margin-left: 12px;
    }
    @media (max-width: 600px) {
      .container {padding: 10px;}
      h1 {font-size: 1.2em;}
      .avatar {width: 80px; height: 80px;}
      .post-list li {padding: 10px 8px;}
    }
  </style>
  <!-- 字体图标库，可选 -->
  <script src="https://kit.fontawesome.com/6d88f9f2ba.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <div class="center">
      <!-- 头像图片，确保 /images/avatar.jpg 存在 -->
      <img src="/images/avatar.jpg" alt="Ailysr头像" class="avatar">
      <h1>Ailysr</h1>
      <p class="desc">热爱编程与分享，专注于前端、后端、AI、开源项目与技术成长。</p>
      <div class="tags">
        <span class="tag">Python</span>
        <span class="tag">JavaScript</span>
        <span class="tag">前端</span>
        <span class="tag">机器学习</span>
        <span class="tag">算法</span>
      </div>
      <div class="social">
        <a href="mailto:wuchaokang@mail.nwpu.edu.cn" title="邮箱"><i class="fas fa-envelope"></i></a>
        <a href="https://github.com/Ailysr" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
        <!-- <a href="#" title="微信"><i class="fab fa-weixin"></i></a> -->
      </div>
    </div>

    <h2>📝 精选文章</h2>
    <ul class="post-list">
      <li>
        <a class="post-title" href="https://Ailysr.github.io/2025/06/18/my-first-blog.html">我的第一篇博客：Hello World！</a>
        <span class="post-date">2025-06-18</span>
      </li>
      <li>
        <a class="post-title" href="#">用 Jekyll 和 GitHub Pages 搭建个人博客</a>
        <span class="post-date">2025-06-15</span>
      </li>
      <li>
        <a class="post-title" href="#">算法学习心得分享</a>
        <span class="post-date">2025-06-10</span>
      </li>
    </ul>

    <h2>📫 联系方式</h2>
    <div>
      <strong>邮箱：</strong> wuchaokang@mail.nwpu.edu.cn<br>
      <strong>GitHub：</strong> <a href="https://github.com/Ailysr" target="_blank">Ailysr</a>

    <div style="margin-top: 36px; color: #888; text-align: center;">
      分享知识，记录成长，结交朋友。<br>
      <small>&copy; 2025 Ailysr</small>
    </div>
  </div>
</body>
</html>
